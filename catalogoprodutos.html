<!DOCTYPE html>
<html lang="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Produtos</title>

    <style>
        
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            font-size: 14px;
        }

        h1{
            color:rgb(0, 0, 0);     
        }

        img{
            width: 90px;
            height: 90px;
        }

        table{
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            padding: 10px;
        }

        th{
            background-color: rgb(255, 0, 0);
            color: white;
            padding: 10px;
        }

        tr{
            font-style: oblique;
            padding: 10px;
        }

        a{
            text-decoration: none;
            color: rgb(255, 0, 0);
            font-weight: bold;
        }


    </style>
</head>
<body>

    <h1>Vocaloids</h1>

    <table border="1">
        <tr>
            <th>Imagem</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Link</th>
        </tr>

        <tr>
            <td>
                <img src="imagens/tetodancin.gif" alt="teto">
            </td>
            <td>Kasane Teto</td>
            <td>Muitos Pães</td>
            <td>
                <a href="https://www.youtube.com/watch?v=JALbemLw3G4" target="_blank">Teto Territory</a>
            </td>
        </tr>

        <tr>
            <td>
                <img src="imagens/mikueat.gif" alt="miku">
            </td>
            <td>Hatsune Miku</td>
            <td>Um Alho Poró</td>
            <td>
                <a href="https://www.youtube.com/watch?v=jhl5afLEKdo"/ target="_blank">Word is Mine</a>
            </td>
        </tr>

        <tr>
            <td>
                <img src="imagens/rin.gif" alt="rin">
            </td>
            <td>Kagamine Rin</td>
            <td>R$200.000.000</td>
            <td>
                <a href="https://www.youtube.com/watch?v=oEkGC2HV7rc"/ target="_blank">Bring it on</a>
            </td>  
        </tr>

        <tr></tr>
    </table>
    
</body>
</html>
